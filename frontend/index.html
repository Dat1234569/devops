<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
</head>
<body>

<h1>Calculator</h1>

<input id="a" type="number" placeholder="Number A">

<select id="operator">
    <option value="+">+</option>
    <option value="-">-</option>
    <option value="*">*</option>
    <option value="/">/</option>
</select>

<input id="b" type="number" placeholder="Number B">

<button onclick="calculate()">Calculate</button>

<h2 id="result"></h2>

<h3>History</h3>
<ul id="history"></ul>

<script src="app.js"></script>

</body>
</html>
